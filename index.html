<style>
  * {

    display: flex;

    margin-bottom: 8px;

    width: 40px;

    display: inline-flex;

    .verse-num {

</style>

    { num: 55, arabic: "إِنَّ أَصْحَابَ الْجَنَّةِ الْيَوْمَ فِي شُغُلٍ فَاكِهُونَ" },

    { num: 67, arabic: "وَلَوْ نَشَاءُ لَمَسَخْنَاهُمْ عَلَىٰ مَكَانَتِهِمْ فَمَا اسْتَطَاعُوا مُضِيًّا وَلَا يَرْجِعُونَ" },
    { num: 68, arabic: "وَمَنْ نُعَمِّرْهُ نُنَكِّسْهُ فِي الْخَلْقِ ۚ أَفَلَا يَعْقِلُونَ" },

    { num: 73, arabic: "وَلَهُمْ فِيهَا مَنَافِعُ وَمَشَارِبُ ۚ أَفَلَا يَشْكُرُونَ" },
    { num: 74, arabic: "وَاتَّخَذُوا مِنْ دُونِ اللَّهِ آلِهَةً لَعَلَّهُمْ يُنْصَرُونَ" },
    { num: 75, arabic: "لَا يَسْتَطِيعُونَ نَصْرَهُمْ وَهُمْ لَهُمْ جُنْدٌ مُحْضَرُونَ" },
    { num: 76, arabic: "فَلَا يَحْزُنْكَ قَوْلُهُمْ ۘ إِنَّا نَعْلَمُ مَا يُسِرُّونَ وَمَا يُعْلِنُونَ" },
    { num: 77, arabic: "أَوَلَمْ يَرَ الْإِنْسَانُ أَنَّا خَلَقْنَاهُ مِنْ نُطْفَةٍ فَإِذَا هُوَ خَصِيمٌ مُبِينٌ" },
    { num: 78, arabic: "وَضَرَبَ لَنَا مَثَلًا وَنَسِيَ خَلْقَهُ ۖ قَالَ مَنْ يُحْيِي الْعِظَامَ وَهِيَ رَمِيمٌ" },
    { num: 79, arabic: "قُلْ يُحْيِيهَا الَّذِي أَنْشَأَهَا أَوَّلَ مَرَّةٍ ۖ وَهُوَ بِكُلِّ خَلْقٍ عَلِيمٌ" },
    { num: 80, arabic: "الَّذِي جَعَلَ لَكُمْ مِنَ الشَّجَرِ الْأَخْضَرِ نَارًا فَإِذَا أَنْتُمْ مِنْهُ تُوقِدُونَ" },
    { num: 81, arabic: "أَوَلَيْسَ الَّذِي خَلَقَ السَّمَاوَاتِ وَالْأَرْضَ بِقَادِرٍ عَلَىٰ أَنْ يَخْلُقَ مِثْلَهُمْ ۚ بَلَىٰ وَهُوَ الْخَلَّاقُ الْعَلِيمُ" },
    { num: 82, arabic: "إِنَّمَا أَمْرُهُ إِذَا أَرَادَ شَيْئًا أَنْ يَقُولَ لَهُ كُنْ فَيَكُونُ" },
    { num: 83, arabic: "فَسُبْحَانَ الَّذِي بِيَدِهِ مَلَكُوتُ كُلِّ شَيْءٍ وَإِلَيْهِ تُرْجَعُونَ" }
  ];

  // Audio URLs: Surah 036 Yaseen (Alafasy high quality)
  function getAyahUrl(verseNumber) {
    const surahCode = "036";
    const versePadded = String(verseNumber).padStart(3, '0');
    return `https://everyayah.com/data/Alafasy_128kbps/${surahCode}${versePadded}.mp3`;
  }

  // DOM elements
  const versesContainer = document.getElementById('versesList');
  const audioElem = document.getElementById('quranAudio');
  const playBtn = document.getElementById('playToggleBtn');
  const statusLabel = document.getElementById('audioStatusLabel');
  const progressFillBar = document.getElementById('audioProgressFill');

  let currentIdx = 0;
  let isPlaying = false;
  let autoNextTimeout = null;

  // Build all 83 verse cards
  function buildVerses() {
    versesContainer.innerHTML = '';
    versesData.forEach((verse, idx) => {
      const card = document.createElement('div');
      card.className = 'verse-item';
      card.setAttribute('data-index', idx);
      card.setAttribute('data-verse', verse.num);
      card.innerHTML = `
        <div class="verse-header">
          <span class="verse-num">${verse.num}</span>
          <div class="arabic-text">${verse.arabic}</div>
        </div>
      `;
      card.addEventListener('click', (e) => {
        e.stopPropagation();
        jumpToVerse(idx);
      });
      versesContainer.appendChild(card);
    });
  }

  function setActiveVerse(index, smoothScroll = true) {
    const cards = document.querySelectorAll('.verse-item');
    cards.forEach((card, i) => {
      if (i === index) card.classList.add('active');
      else card.classList.remove('active');
    });
    const progressPercent = ((index + 1) / versesData.length) * 100;
    progressFillBar.style.width = `${progressPercent}%`;
    
    if (smoothScroll) {
      const activeCard = document.querySelector(`.verse-item[data-index='${index}']`);
      if (activeCard) {
        activeCard.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'nearest' });
      }
    }
  }

  function clearNextTimeout() {
    if (autoNextTimeout) { clearTimeout(autoNextTimeout); autoNextTimeout = null; }
  }

  function updateUIStatus(verseIdx, playing) {
    const verseNum = versesData[verseIdx].num;
    if (playing) {
      statusLabel.innerHTML = `🔊 تلاوة الآية ${verseNum}`;
    } else {
      if (audioElem.paused && audioElem.currentTime === 0) {
        statusLabel.innerHTML = `🎧 اضغط للاستماع — الآية ${verseNum}`;
      } else if (audioElem.paused && audioElem.currentTime > 0) {
        statusLabel.innerHTML = `⏸ متوقف عند الآية ${verseNum}`;
      } else {
        statusLabel.innerHTML = `📖 يستمع إلى الآية ${verseNum}`;
      }
    }
  }

  function playVerse(index, autoContinue = true) {
    if (index < 0 || index >= versesData.length) return;
    clearNextTimeout();
    audioElem.pause();
    isPlaying = false;
    currentIdx = index;
    const verse = versesData[currentIdx];
    audioElem.src = getAyahUrl(verse.num);
    audioElem.load();
    setActiveVerse(currentIdx, true);
    updateUIStatus(currentIdx, true);
    
    const playPromise = audioElem.play();
    if (playPromise !== undefined) {
      playPromise.then(() => {
        isPlaying = true;
        playBtn.innerHTML = '⏸︎';
        updateUIStatus(currentIdx, true);
        if (autoContinue) {
          audioElem.onended = () => {
            if (currentIdx + 1 < versesData.length) {
              autoNextTimeout = setTimeout(() => playVerse(currentIdx + 1, true), 520);
            } else {
              isPlaying = false;
              playBtn.innerHTML = '▶︎';
              statusLabel.innerHTML = '✅ تمت تلاوة سورة يس كاملة 🌟';
              progressFillBar.style.width = '100%';
              audioElem.onended = null;
              clearNextTimeout();
            }
          };
        }
      }).catch(err => {
        isPlaying = false;
        playBtn.innerHTML = '▶︎';
        statusLabel.innerHTML = '⚠️ يرجى التفاعل المباشر';
        clearNextTimeout();
      });
    }
    audioElem.onpause = () => {
      if (isPlaying) { isPlaying = false; playBtn.innerHTML = '▶︎'; updateUIStatus(currentIdx, false); clearNextTimeout(); }
    };
    audioElem.onplay = () => {
      if (!isPlaying) { isPlaying = true; playBtn.innerHTML = '⏸︎'; updateUIStatus(currentIdx, true); }
    };
    audioElem.onerror = () => {
      isPlaying = false; playBtn.innerHTML = '▶︎'; statusLabel.innerHTML = '⚠️ خطأ في التحميل';
      clearNextTimeout();
    };
  }

  function jumpToVerse(index) {
    clearNextTimeout();
    if (index === currentIdx && isPlaying) {
      audioElem.pause();
      playVerse(index, true);
    } else {
      playVerse(index, true);
    }
  }

  function togglePlayback() {
    if (!audioElem.src || audioElem.ended) {
      if (audioElem.ended) currentIdx = 0;
      clearNextTimeout();
      playVerse(currentIdx, true);
      return;
    }
    if (isPlaying) {
      audioElem.pause();
      isPlaying = false;
      playBtn.innerHTML = '▶︎';
      statusLabel.innerHTML = `⏸ توقف عند الآية ${versesData[currentIdx].num}`;
      clearNextTimeout();
      audioElem.onended = null;
    } else {
      audioElem.play().then(() => {
        isPlaying = true;
        playBtn.innerHTML = '⏸︎';
        updateUIStatus(currentIdx, true);
        audioElem.onended = () => {
          if (currentIdx + 1 < versesData.length) {
            autoNextTimeout = setTimeout(() => playVerse(currentIdx + 1, true), 520);
          } else {
            isPlaying = false; playBtn.innerHTML = '▶︎';
            statusLabel.innerHTML = '✨ أتممت سورة يس ✨';
            progressFillBar.style.width = '100%';
          }
        };
      }).catch(() => { statusLabel.innerHTML = '⚠️ يلزم تفاعل'; });
    }
  }

  function init() {
    buildVerses();
    setActiveVerse(0, false);
    playBtn.innerHTML = '▶︎';
    statusLabel.innerHTML = '🎙️ استمع لسورة يس كاملة (١–٨٣)';
    progressFillBar.style.width = '0%';
    currentIdx = 0;
    playBtn.addEventListener('click', (e) => { e.preventDefault(); togglePlayback(); });
  }
  init();
</script>
</body>
</html>
